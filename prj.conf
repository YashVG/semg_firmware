CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=n
CONFIG_BT_BAS=y
CONFIG_BT_DEVICE_NAME="sEMG Sensor"
CONFIG_BT_DEVICE_APPEARANCE=0

# System workqueue stack: bt_gatt_notify call chain needs headroom
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# MTU / buffer sizes for 240-byte notifications
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# Needed so the peripheral can initiate bt_gatt_exchange_mtu()
CONFIG_BT_GATT_CLIENT=y
